spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/home_smart_factory}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: false
  main:
    web-application-type: none

aws:
  sqs:
    queue-url: ${SQS_QUEUE_URL:http://localhost:4566/000000000000/iot-data-queue}
    region: ${AWS_REGION:ap-northeast-1}
    polling-enabled: true
